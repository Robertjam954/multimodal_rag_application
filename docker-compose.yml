version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    ports:
      - "50505:50505"
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=50505
      # Disable Azure integrations for local dev; use local fallbacks
      - DOCUMENT_RETRIEVER=redis_notes
      - USE_REDIS_CACHE=false
      - USE_GRAPHRAG=false
      - USE_VERIFIER=true
      - USE_STREAMING=true
      - USE_VOICE_DEMO=false
      - USE_SQL_DEMO=true
      - USE_CONTENT_SAFETY=false
      - USE_PII_REDACTION=false
      - USE_FEEDBACK=true
      - USE_USER_UPLOAD=false
      - USE_CHAT_HISTORY_COSMOS=false
      - USE_CHAT_HISTORY_BROWSER=true
      - MODE=local
    volumes:
      # Mount source for hot reload during development (optional)
      - ./app/backend:/app
      - ./data:/data
    depends_on:
      - redis
    networks:
      - mmrag

  frontend:
    build:
      context: .
      dockerfile: app/frontend/Dockerfile.dev
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./app/frontend/src:/app/src
      - ./app/frontend/index.html:/app/index.html
      - ./app/frontend/vite.config.ts:/app/vite.config.ts
      - ./app/frontend/tsconfig.json:/app/tsconfig.json
    environment:
      - VITE_API_URL=http://localhost:50505
    networks:
      - mmrag
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mmrag
    command: redis-server --appendonly yes

volumes:
  redis_data:

networks:
  mmrag:
    driver: bridge
