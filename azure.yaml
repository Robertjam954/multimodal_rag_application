name: multimodal-rag-application
metadata:
  template: multimodal-rag-application@0.1.0

services:
  backend:
    project: app/backend
    language: python
    host: containerapp
    docker:
      path: Dockerfile
      context: ../..

# NOTE: the `functions` (cloud ingestion) service is deferred to Stage 2.
# Re-add it once infra/app/functions.bicep is wired into main.bicep.

hooks:
  preprovision:
    shell: sh
    run: scripts/auth_init.sh
    interactive: true
    continueOnError: false
  postprovision:
    shell: sh
    run: scripts/prepdocs.sh
    interactive: false
    continueOnError: true
