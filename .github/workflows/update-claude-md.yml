name: Weekly CLAUDE.md Verification and TODO

on:
  # Run weekly on Mondays at 9 AM UTC
  schedule:
    - cron: '0 9 * * 1'

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      skip_pr:
        description: 'Skip PR creation and commit directly to main (not recommended)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  verify-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better context

      - name: Read prompt file
        id: read-prompt
        run: |
          echo "Reading prompt from .github/workflows/claude-md-review-prompt.md"
          {
            echo "PROMPT_CONTENT<<EOF"
            cat .github/workflows/claude-md-review-prompt.md
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Generate unique branch name
        id: branch
        run: |
          BRANCH="weekly-docs-$(date +%Y%m%d-%H%M%S)"
          echo "branch_name=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "Generated branch name: $BRANCH"

      - name: Create feature branch
        if: ${{ !inputs.skip_pr }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.branch.outputs.branch_name }}"

      - name: Run Claude Code to verify CLAUDE.md and generate TODO.md
        uses: anthropics/claude-code-action@beta
        id: claude-update
        with:
          # OAuth token for a Claude subscription. Generate locally with:
          #   claude setup-token
          # then add it as the repository secret CLAUDE_CODE_OAUTH_TOKEN.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # 'agent' mode runs non-interactively for automation.
          mode: agent

          direct_prompt: |
            ${{ env.PROMPT_CONTENT }}

            Additional instructions:
            - This is an automated weekly workflow running in GitHub Actions.
            - You have full access to read all files in the repository.

            IMPORTANT: Follow these steps in order:
            1. FIRST, use the Read tool to read the current CLAUDE.md at the root of the repository.
            2. THEN systematically analyze the codebase as described above.
            3. THEN update CLAUDE.md ONLY where it has drifted from reality.
               The developer updates CLAUDE.md at the end of each working session;
               this run is an honest verification pass, so if the file is accurate,
               leave it untouched.
            4. FINALLY, regenerate TODO.md at the repository root as described in
               the prompt (prioritized, dated, actionable).

            - Preserve any existing content that is still accurate.
            - Favor reality (the code) over stale documentation.
            - Never write secrets or env var values - names only.
            - You MUST read files before editing them - this is a requirement.
            - Use single hyphens, never em dashes. No emojis.

          # Time for a thorough codebase analysis.
          timeout_minutes: 25

          # Allow multiple turns for thorough analysis.
          max_turns: 30

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet HEAD -- CLAUDE.md TODO.md && [ -z "$(git status --porcelain -- CLAUDE.md TODO.md)" ]; then
            echo "No changes detected in CLAUDE.md or TODO.md"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changes detected"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "::group::Docs changes"
            git status --porcelain -- CLAUDE.md TODO.md
            git diff HEAD -- CLAUDE.md TODO.md
            echo "::endgroup::"
          fi

      - name: Commit changes
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          git add CLAUDE.md TODO.md
          git commit -m "chore: weekly CLAUDE.md verification + TODO refresh

          Automated Monday pass: verified CLAUDE.md against the current codebase
          and regenerated the prioritized TODO list.

          Generated by Claude Code GitHub Action"

      - name: Push changes and create PR
        if: steps.check-changes.outputs.has_changes == 'true' && !inputs.skip_pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin "${{ steps.branch.outputs.branch_name }}"
          gh pr create \
            --title "chore: weekly CLAUDE.md verification + TODO (automated)" \
            --body "## Automated weekly docs pass

          This PR is the Monday verification run: it checks CLAUDE.md against the
          current codebase (the developer keeps it updated at the end of each
          session; this run keeps it honest) and regenerates the prioritized
          TODO.md.

          ### What was done:
          - Analyzed the repository structure
          - Verified technical details in CLAUDE.md (versions, commands, paths, env vars)
          - Corrected any drift between docs and code
          - Regenerated TODO.md with a prioritized, dated task list

          ### Review checklist:
          - [ ] Verify the technical accuracy of updates
          - [ ] Check that no secrets or env var values were added
          - [ ] Confirm the TODO priorities make sense

          ---
          *Automatically generated by the weekly docs verification workflow.*
          *Workflow run: [\${{ github.run_id }}](\${{ github.server_url }}/\${{ github.repository }}/actions/runs/\${{ github.run_id }})*" \
            --base main \
            --head "${{ steps.branch.outputs.branch_name }}" \
            --label "documentation" \
            --label "automated" || \
          gh pr create \
            --title "chore: weekly CLAUDE.md verification + TODO (automated)" \
            --body "Automated weekly docs pass. See workflow run ${{ github.run_id }}." \
            --base main \
            --head "${{ steps.branch.outputs.branch_name }}"

      - name: Direct commit (if skip_pr is true)
        if: steps.check-changes.outputs.has_changes == 'true' && inputs.skip_pr
        run: |
          git push origin main
          echo "Changes committed directly to main branch (skip_pr was enabled)"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Workflow Summary"
            echo ""
            if [[ "${{ steps.check-changes.outputs.has_changes }}" == "true" ]]; then
              echo "**CLAUDE.md and/or TODO.md were updated**"
              if [[ "${{ inputs.skip_pr }}" == "true" ]]; then
                echo "Changes were committed directly to main branch."
              else
                echo "A pull request has been created for review."
                echo "Branch: \`${{ steps.branch.outputs.branch_name }}\`"
              fi
            else
              echo "**No updates needed** - CLAUDE.md is up to date and TODO.md is unchanged."
            fi
            echo ""
            echo "---"
            echo "*Run ID: ${{ github.run_id }}*"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Error notification
        if: failure()
        run: |
          {
            echo "## Workflow Failed"
            echo ""
            echo "The weekly docs verification workflow encountered an error."
            echo "Please check the workflow logs for details."
            echo ""
            echo "[View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } >> "$GITHUB_STEP_SUMMARY"
