name: Self-Documenting Agent (progress sync)

# Runs the self-documenter agent (.claude/agents/self-documenter.md) to keep STATUS.md,
# project markdown, and docs/adr/ in sync with the code. Diff-driven; opens a PR with the
# doc updates. Mirrors the auth/PR pattern of update-claude-md.yml (which only touches CLAUDE.md).

on:
  # Daily progress sync.
  schedule:
    - cron: '0 8 * * *'

  # After code lands on main (doc-only paths excluded so the agent's own PR merge never re-triggers it).
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'infra/**'
      - 'scripts/**'
      - 'evals/**'
      - 'tests/**'

  workflow_dispatch:
    inputs:
      skip_pr:
        description: 'Commit directly to main instead of opening a PR (not recommended)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: self-document-${{ github.ref }}
  cancel-in-progress: false

jobs:
  self-document:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so the agent can diff main

      - name: Load self-documenter agent spec
        id: spec
        run: |
          echo "Loading prompt from .claude/agents/self-documenter.md"
          {
            echo "SPEC<<EOF"
            cat .claude/agents/self-documenter.md
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Generate unique branch name
        id: branch
        run: |
          BRANCH="docs-sync-$(date +%Y%m%d-%H%M%S)"
          echo "branch_name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create feature branch
        if: ${{ !inputs.skip_pr }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.branch.outputs.branch_name }}"

      - name: Run self-documenter agent
        uses: anthropics/claude-code-action@beta
        with:
          # OAuth token for a Claude subscription (same secret as update-claude-md.yml).
          # Generate locally with `claude setup-token`, then add repo secret CLAUDE_CODE_OAUTH_TOKEN.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          mode: agent
          direct_prompt: |
            You are running as the self-documenter agent for this repository inside GitHub
            Actions. Follow the agent specification below exactly.

            ${{ env.SPEC }}

            Additional runtime instructions:
            - This is an automated CI run. You have read access to the whole repo and may edit
              STATUS.md, README.md, other project markdown, and create ADRs under docs/adr/.
            - You MUST read a file before editing it - this is a requirement.
            - Reality (the code) wins over stale docs. Never invent progress; an unchecked
              STATUS.md box stays unchecked until the code proves otherwise.
            - Never write secrets or env var values - names only.
            - Single hyphens only, never em dashes; no emojis.
          timeout_minutes: 25
          max_turns: 30

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet HEAD; then
            echo "No documentation changes detected"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "::group::Documentation changes"
            git diff --stat HEAD
            echo "::endgroup::"
          fi

      - name: Commit changes
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          git add -A
          git commit -m "docs: sync STATUS/ADRs with code (self-documenter)

          Automated documentation sync generated by the self-documenter agent
          (.claude/agents/self-documenter.md), keeping STATUS.md, project markdown,
          and ADRs aligned with the current codebase."

      - name: Push changes and create PR
        if: steps.check-changes.outputs.has_changes == 'true' && !inputs.skip_pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin "${{ steps.branch.outputs.branch_name }}"
          gh pr create \
            --title "docs: progress sync (self-documenter, automated)" \
            --body "## Automated documentation sync

          The self-documenter agent analyzed the diff and updated the project docs to match the code.

          ### Review checklist
          - [ ] STATUS.md checkboxes reflect what the code actually proves
          - [ ] Any new ADR under \`docs/adr/\` is accurate and cites real files
          - [ ] No secrets or env var values were added (names only)
          - [ ] Paths, commands, and env vars are correct

          ---
          *Generated by the self-documenter workflow. Reality (the code) wins over stale docs.*" \
            --base main \
            --head "${{ steps.branch.outputs.branch_name }}" \
            --label "documentation" \
            --label "automated"

      - name: Direct commit (if skip_pr is true)
        if: steps.check-changes.outputs.has_changes == 'true' && inputs.skip_pr
        run: |
          git push origin HEAD:main
          echo "Changes committed directly to main (skip_pr was enabled)"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Self-documenter summary"
            echo ""
            if [[ "${{ steps.check-changes.outputs.has_changes }}" == "true" ]]; then
              echo "**Docs updated.**"
              if [[ "${{ inputs.skip_pr }}" == "true" ]]; then
                echo "Committed directly to main."
              else
                echo "PR opened from branch \`${{ steps.branch.outputs.branch_name }}\`."
              fi
            else
              echo "**No updates needed** - docs already match the code."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
